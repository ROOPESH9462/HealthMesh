version: '3.8'

services:
  # 1. MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: healthcare-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-network

  # 2. Redis Cache & Messaging Broker
  redis:
    image: redis:7.0-alpine
    container_name: healthcare-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend-network

  # 3. FastAPI AI Microservice
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: healthcare-ai-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
    networks:
      - backend-network

  # 4. Express API Gateway
  backend:
    build:
      context: .
      dockerfile: ./apps/backend/Dockerfile
    container_name: healthcare-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/healthcare_management_db
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - redis
      - ai-service
    networks:
      - backend-network
      - frontend-network

  # 5. React Frontend
  frontend:
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    container_name: healthcare-frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - frontend-network

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge
