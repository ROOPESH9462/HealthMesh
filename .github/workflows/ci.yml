name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Verify API Contracts & Shared Compilation
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/shared-utils
          npm run build --workspace=packages/api-contracts

      - name: Build & Typecheck Express Gateway
        run: npm run build --workspace=apps/backend

      - name: Run Backend Jest Unit Tests
        run: npm run test --workspace=apps/backend
        env:
          MONGO_URI: mongodb://localhost:27017/healthcare_test_db
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_jwt_access_secret_key_12345
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_12345

      - name: Build & Typecheck React Client
        run: npm run build --workspace=apps/frontend
